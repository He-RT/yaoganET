services:
  irrigation:
    build: .
    container_name: irrigation
    restart: unless-stopped
    network_mode: host
    environment:
      GEE_PROJECT: chuang-yaogan
      GEE_SERVICE_ACCOUNT_EMAIL: ${GEE_SERVICE_ACCOUNT_EMAIL}
      GEE_SERVICE_ACCOUNT_KEY: /secrets/gee-key.json
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      HTTP_PROXY: ${HTTP_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1}
    volumes:
      - ./secrets:/secrets:ro
